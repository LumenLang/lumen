# Script discovery and loading behavior
scripts:
  # Directory where script files are loaded from.
  # This path is relative to the plugin data folder.
  folder: "scripts"

  # File extension treated as a script.
  # Example: example.luma
  extension: ".luma"

  # Compile and load all scripts during server startup.
  # When combined with cached compiled classes, startup can be nearly instant.
  load-all-on-startup: true

  # When enabled, scripts are compiled and loaded immediately in onEnable instead of being deferred to the first tick.
  # Disabled by default because most setups do not need early-load behaviour.
  enable-all-scripts-immediately-on-startup: false

  # Reload scripts automatically when files change on disk.
  # Useful for development.
  reload-on-save: true

  # Compile and load new scripts immediately when they are created.
  # Useful for development, but be cautious if allowing untrusted script sources.
  load-on-create: true

  # Unload and remove compiled classes when script files are deleted.
  # Prevents memory leaks and stale classes when scripts are removed.
  unload-on-delete: true

  # Debounce delay (in milliseconds) for the script file watcher.
  # Lower values react faster but may cause duplicate events from editors
  # that write files in multiple steps.
  watcher-debounce-ms: 200

# Debugging and diagnostics output
debug:
  # Log warnings about potential issues in scripts, such as deprecated features,
  # unsupported language features, or other non-fatal problems.
  log-warnings: true

  # Log informational messages from Lumen.
  # Disable this to silence all informational output.
  log-info: true

  # Log compilation timings and internal steps.
  # Helpful when diagnosing slow startups or reloads.
  log-compilation: false

  # Write generated Java source files to disk.
  # Useful for debugging the compiler or reporting issues.
  dump-generated-java: false

  # Enable verbose debug logging of the compilation process.
  # Logs detailed information about pattern matching, token consumption,
  # type binding resolution, and Java code generation.
  # Only enable this when debugging issues with pattern matching or compilation.
  # Note: This can produce a large amount of log output, so it is recommended that you only have small test scripts when enabling this.
  full-debug: false

  # When enabled, diagnostic output highlights the entire source line
  # and renders all individual labels as notes instead of inline underlines.
  # Useful when diagnostics on long or complex lines are hard to read.
  verbose-diagnostics: false

  # ============================================================================
  # LUMEN DEBUG SERVICE
  # ============================================================================
  # Control channel for external debug clients (editors, IDEs, etc).
  # Allows breakpoints, variable inspection, expression overrides, snippet
  # execution, and condition tracing.
  #
  # !!!  EXTREME WARNING  !!!
  # Enabling this service exposes a port that can run ARBITRARY CODE on this
  # machine. Any connected client can execute Java snippets, rewrite running
  # scripts, and access any data the server can access.
  #
  # Treat enabling debug like opening a remote root shell.
  #
  # Hard rules:
  #   - never enable on a production server
  #   - never enable on an untrusted network
  #   - never share a pairing code with anyone you would not give shell access
  #   - keep allow-remote-access: false unless you understand the consequences
  #
  # If unsure, leave enabled: false.
  service:
    # Master switch. When false, the debug service does not start at all and
    # no port is bound. Default: false.
    enabled: false

    # Local (same machine) connection policy.
    # Connections from 127.0.0.1 / ::1 are considered "same OS".
    same-os:
      # Allow clients running on the same machine to connect at all.
      allow-same-os-access: true

      # Require pairing for same-OS connections. When false, local clients
      # are auto-trusted on first connect. When true, even local clients
      # must be approved via /lumendebug pair <code>.
      require-pairing: false

    # Remote (off-machine) connection policy.
    remote:
      # Allow non-loopback connections at all. When false, the service
      # binds to bind-host and rejects any non-loopback peer regardless
      # of bind. Default: false (recommended).
      allow-remote-access: false

      # Require pairing for remote connections. Strongly recommended to
      # leave this true. Only consulted when allow-remote-access is true.
      require-pairing: true

    # Address to bind on. 127.0.0.1 means same-host only at the OS level.
    # Use 0.0.0.0 (or a specific public address) only if you also set
    # remote.allow-remote-access: true and you have a firewall.
    bind-host: "127.0.0.1"

    # WebSocket port debug clients connect to.
    port: 7400

    # How long an issued session token stays valid, in minutes.
    # When the token expires, the client must re-handshake. A previously
    # paired client skips the pairing code prompt and gets a fresh token
    # automatically. Default: 300 (5 hours).
    session-timeout-minutes: 300

# Compilation strategy and performance
performance:
  # Java compiler backend used to compile generated script classes.
  #
  # Options:
  #   auto   - Use javac when available, fall back to Vanta otherwise (default)
  #   javac  - Always use the system Java compiler
  #   vanta  - Use Vanta, a fast embedded compiler (beta, roughly 10 to 20x faster in hot compiles, much faster in cold as well)
  #
  # Vanta is in beta. If it cannot compile a file it automatically falls back to javac for that file.
  # Vanta is only meant to have Java 17 features, so if your scripts use newer Java features (e.g. because of a addon, or raw Java code), those files may not compile properly with Vanta.
  compiler: auto

  # Cache compiled classes between reloads and restarts.
  #
  # If scripts have not changed, classes will be loaded almost instantly
  # without recompilation, making startup effectively immediate.
  #
  # When a script changes, only that script is recompiled.
  cache-compiled-classes: true

  # Compile and load scripts asynchronously during server startup.
  # Not usually recommended since cached compiled classes already load nearly instantly.
  # When enabled, scripts load even later (binding still happens on the main thread).
  load-scripts-async-on-startup: false

  # Run a full warmup on startup by parsing and compiling a bundled example
  # script. This warms up the entire pipeline (parser, code emitter, compiler)
  # so that the real scripts load faster when they are loaded later in the startup process.
  # This is done asynchronously to avoid blocking the main thread, but it may be worse overall startup for bad CPUs or limited resources.
  # Note, JIT takes time to optimize, running a warmup way earlier in the startup process results in much better compile times.
  warmup-on-startup: false

  # This feature only applies when compiler is set to vanta.
  # Number of threads used to compile scripts in parallel.
  # When enabled, multiple scripts are compiled concurrently, which can significantly reduce total compilation time on decent hardware with many scripts.
  # However, it is not useful if you only have small scripts, or very few scripts. It may also wield diminishing returns or even worse performance if other things are taking up threads in the startup.
  # Set to 0 or 1 to compile scripts sequentially.
  # Best number for many scripts is usually 3 or 8 threads.
  compile-threads: 2

  # Exclude certain packages from the classpath when compiling scripts, such as internals or large libraries.
  # This can speed up compilation and reduce memory usage.
  # This shouldn't cause any issues.
  reduce-classpath: true

  # Define compiled script classes on a background thread instead of the main server thread.
  # This reduces main thread usage during script loading and reloading.
  # The class activation (instantiation and lifecycle hooks) still runs on the main thread.
  async-define-class: true

  # Number of threads used to parse independent top-level blocks in parallel within a script.
  # Independent blocks (commands, events, schedules) are emitted concurrently, while blocks
  # that affect global state (config, global, data class) are always processed sequentially first.
  # Set to 0 or 1 to disable parallel parsing entirely.
  parallel-parse-threads: 3

# Language-level behavior
language:
  experimental:
    # Allow raw Java code inside scripts.
    #
    # This gives scripts direct access to the JVM and server internals.
    # Scripts can do anything Java can do.
    #
    # Example:
    # java {
    #   System.out.println("Hello from Java");
    # }
    #
    # Only enable this if you fully trust the script source.
    # Always read scripts before running them when this is enabled.
    raw-java: false

    # Enable code transformation (experimental).
    #
    # WARNING: This is an experimental feature. Transformers may modify
    # lines that are actually needed at runtime. Only enable this if you
    # understand the risks and have tested your scripts thoroughly.
    #
    # When enabled, the compiler runs registered code transformers after
    # code generation. Each transformer can remove, replace, or insert
    # lines it owns. Lumen ships with built in transformers, and addons
    # can register their own through the API.
    code-transform: false

# Features that can be toggled on or off, related to compatibility or quality of life improvements.
features:
  # Translate legacy & color codes (e.g. &a, &7, &l) into colored text.
  # Works alongside MiniMessage when both are enabled.
  use-legacy-colors: true

  # Enable Paper-only APIs and optimizations.
  paper-only-features: true

  inventories:
    # Enable inventory hot reload.
    #
    # When enabled, players who have a Lumen inventory open will have its
    # contents and title replaced in place on any script reload, instead
    # of the inventory closing and reopening. This makes script hot reloading
    # seamless for players viewing an inventory.
    hot-reload: true

# Miscellaneous settings that don't fit into other categories
extra:
  # Weather to enable the file watcher for the confguration file.
  # When enabled, changes to the config.yml file will be detected and applied without restarting or doing the /lumen reload command.
  enable-config-file-watcher: true

  # When enabled, Lumen will dump all registered patterns, type bindings, and more to the "documentation" folder.
  # The files generated are in the .ldoc format, which is a compressed JSON format that can be used by tools.
  enable-documentation-tool: false